<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Records</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  max-width: 1100px;
}
h1 { text-align: center; }
  
section {
  margin-bottom: 30px;
  padding: 15px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

td.date-cell,
th.date-cell {
  min-width: 7ch;
  white-space: nowrap;
}
  
form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

input, textarea, select, button {
  padding: 8px;
  width: 100%;
  box-sizing: border-box;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover { background: #45a049; }

button.secondary {
  background: #666;
}

button.secondary:hover { background: #555; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
}

td {
  white-space: pre-wrap;
}
  
th input {
  width: 95%;
  padding: 4px;
  margin-top: 4px;
}

tr:nth-child(even) { background-color: #f2f2f2; }

.selectable-row {
  cursor: pointer;
}

.selected-record {
  outline: 2px solid #4CAF50;
  background-color: #e7f6ea !important;
}

.view-toggle {
  margin-bottom: 15px;
}

.record-card {
  border: 1px solid #ccc;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 6px;
  background: #f9f9f9;
}

.line1 {
  font-weight: bold;
  margin-bottom: 6px;
}

.line2, .line3, .line4 {
  white-space: pre-wrap;
  margin-bottom: 4px;
}

.edit-banner {
  margin-top: 8px;
  padding: 8px;
  background: #eef7ff;
  border: 1px solid #cfe6ff;
  border-radius: 6px;
}

@media(max-width: 768px) {
  form { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1>Health Records</h1>

<section id="authSection">
<h2>Login</h2>
<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>
<button id="logoutBtn" style="display:none;">Logout</button>
<p id="authStatus"></p>
</section>

<section>
<h2>Add Event</h2>
<form id="eventForm">
  <!-- EVENT TYPE DROPDOWN -->
  <select name="event_type" required>
    <option value="">Select Event Type</option>
    <option value="appointment">appointment</option>
    <option value="test">test</option>
    <option value="symptom">symptom</option>
    <option value="journal">journal</option>
  </select>

  <input type="date" name="event_date" required>
  <input type="text" name="doctor_provider" placeholder="Doctor / Provider">
  <textarea name="location" placeholder="Location"></textarea>
  <textarea name="general_note" placeholder="General Note"></textarea>
  <textarea name="outcome" placeholder="Outcome"></textarea>
  <textarea name="follow_up_action" placeholder="Follow-up Action"></textarea>
  <button type="submit" id="submitBtn">Add Record</button>
</form>
<button type="button" id="cancelEditBtn" class="secondary" style="display:none; margin-top:8px;">Cancel Edit</button>
<div id="editBanner" class="edit-banner" style="display:none;"></div>
</section>

<section>
<h2>Records</h2>

<div class="view-toggle">
  <button id="gridViewBtn">Grid View</button>
  <button id="formViewBtn">Form View</button>
  <button id="editModeBtn" class="secondary">Edit Mode: Off</button>
  <span id="editStatus" style="margin-left:8px;"></span>
</div>

<!-- GRID VIEW -->
<div id="gridView">
  <table id="recordsTable">
    <thead>
      <tr>
        <th>Event Type<br><input data-col="event_type"></th>
        <th class="date-cell">Date<br><input data-col="event_date"></th>
        <th>Doctor<br><input data-col="doctor_provider"></th>
        <th>Location<br><input data-col="location"></th>
        <th>Note<br><input data-col="general_note"></th>
        <th>Outcome<br><input data-col="outcome"></th>
        <th>Follow-up<br><input data-col="follow_up_action"></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- FORM VIEW -->
<div id="formView" style="display:none;"></div>

</section>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://nssnhxtdmryuudgfufif.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_MOp5lO5887AmTzwAhLoaOg_W81WZw0-";

const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const tableName = "events";

const loginForm = document.getElementById("loginForm");	
const logoutBtn = document.getElementById("logoutBtn");
const authStatus = document.getElementById("authStatus");
const eventForm = document.getElementById("eventForm");
const submitBtn = document.getElementById("submitBtn");
const cancelEditBtn = document.getElementById("cancelEditBtn");
const editBanner = document.getElementById("editBanner");
const editModeBtn = document.getElementById("editModeBtn");
const editStatus = document.getElementById("editStatus");
const tbody = document.querySelector("#recordsTable tbody");
const formView = document.getElementById("formView");
const gridView = document.getElementById("gridView");

let cachedRecords = [];
let editMode = false;
let editId = null;

checkSession();

async function checkSession() {
  const { data } = await client.auth.getSession();
  if (data.session) {
    authStatus.textContent = "Logged in as " + data.session.user.email;
    loginForm.style.display = "none";
    logoutBtn.style.display = "block";
    loadRecords();
  } else {
    authStatus.textContent = "Not logged in";
    loginForm.style.display = "block";
    logoutBtn.style.display = "none";
  }
}

document.getElementById("eventForm").addEventListener("keydown", function (e) {
  if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
    e.preventDefault();
  }
});
  
loginForm.addEventListener("submit", async e => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({ email, password });

  if (error) alert(error.message);
  else checkSession();
});

logoutBtn.addEventListener("click", async () => {
  await client.auth.signOut();
  location.reload();
});

eventForm.addEventListener("submit", async e => {
  e.preventDefault();
  const formData = Object.fromEntries(new FormData(eventForm));

  let error;
  if (editId) {
    const result = await client
      .from(tableName)
      .update(formData)
      .eq("id", editId)
      .select();
    error = result.error;
    if (!error && (!result.data || result.data.length === 0)) {
      error = { message: "No record updated. Check permissions or record id." };
    }
  } else {
    const result = await client.from(tableName).insert([formData]);
    error = result.error;
  }

  if (error) {
    alert(error.message);
    return;
  }
  else {
    eventForm.reset();
    clearEditState();
    editBanner.textContent = "Changes saved.";
    editBanner.style.display = "block";
    loadRecords();
  }
});

async function loadRecords(filters = {}) {
  let query = client.from(tableName).select("*");

  for (const col in filters) {
    if (filters[col]) {
      query = query.ilike(col, `%${filters[col]}%`);
    }
  }

  const { data, error } = await query.order("event_date", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  cachedRecords = data || [];
  renderGrid(data);
  renderFormView(data);
}

function renderGrid(data) {
  tbody.innerHTML = "";
  data.forEach(row => {
    const tr = document.createElement("tr");
    tr.className = "selectable-row";
    tr.dataset.id = row.id ?? "";
    tr.innerHTML = `
      <td>${row.event_type || ""}</td>
      <td>${row.event_date || ""}</td>
      <td>${row.doctor_provider || ""}</td>
      <td>${row.location || ""}</td>
      <td>${row.general_note || ""}</td>
      <td>${row.outcome || ""}</td>
      <td>${row.follow_up_action || ""}</td>
    `;
    tr.addEventListener("click", () => handleRecordClick(row.id));
    tbody.appendChild(tr);
  });
}

function renderFormView(data) {
  formView.innerHTML = "";
  data.forEach(row => {
    const card = document.createElement("div");
    card.className = "record-card";
    card.classList.add("selectable-row");
    card.dataset.id = row.id ?? "";
    card.innerHTML = `
      <div class="line1">
        ${row.event_type || ""} | ${row.event_date || ""} | ${row.doctor_provider || ""} | ${row.location || ""}
      </div>
      <div class="line2"><strong>Notes:</strong> ${row.general_note || ""}</div>
      <div class="line3"><strong>Outcome:</strong> ${row.outcome || ""}</div>
      <div class="line4"><strong>Follow-up:</strong> ${row.follow_up_action || ""}</div>
    `;
    card.addEventListener("click", () => handleRecordClick(row.id));
    formView.appendChild(card);
  });
}

document.querySelectorAll("th input").forEach(input => {
  input.addEventListener("input", () => {
    const filters = {};
    document.querySelectorAll("th input").forEach(f => {
      filters[f.dataset.col] = f.value;
    });
    loadRecords(filters);
  });
});

document.getElementById("gridViewBtn").onclick = () => {
  gridView.style.display = "block";
  formView.style.display = "none";
};

document.getElementById("formViewBtn").onclick = () => {
  gridView.style.display = "none";
  formView.style.display = "block";
};

editModeBtn.onclick = () => {
  editMode = !editMode;
  if (!editMode) {
    clearEditState();
  }
  updateEditModeUI();
};

cancelEditBtn.onclick = () => {
  clearEditState();
  updateEditModeUI();
};

function updateEditModeUI() {
  editModeBtn.textContent = editMode ? "Edit Mode: On" : "Edit Mode: Off";
  editStatus.textContent = editMode ? "Select a record to edit." : "";
  cancelEditBtn.style.display = editId ? "block" : "none";
  editBanner.style.display = editId ? "block" : "none";
  submitBtn.textContent = editId ? "Save Changes" : "Add Record";
  syncSelectedStyles();
}

function handleRecordClick(id) {
  if (!editMode) return;
  if (!id) {
    alert("This record cannot be edited (missing id).");
    return;
  }
  const record = cachedRecords.find(r => r.id === id);
  if (!record) return;
  editId = id;
  populateForm(record);
  editBanner.textContent = `Editing record ${id}. Update fields and click Save Changes.`;
  updateEditModeUI();
}

function populateForm(record) {
  eventForm.elements["event_type"].value = record.event_type || "";
  eventForm.elements["event_date"].value = record.event_date || "";
  eventForm.elements["doctor_provider"].value = record.doctor_provider || "";
  eventForm.elements["location"].value = record.location || "";
  eventForm.elements["general_note"].value = record.general_note || "";
  eventForm.elements["outcome"].value = record.outcome || "";
  eventForm.elements["follow_up_action"].value = record.follow_up_action || "";
}

function clearEditState() {
  editId = null;
  eventForm.reset();
  editBanner.textContent = "";
  updateEditModeUI();
}

function syncSelectedStyles() {
  document.querySelectorAll(".selected-record").forEach(el => {
    el.classList.remove("selected-record");
  });
  if (!editId) return;
  document.querySelectorAll(`[data-id="${editId}"]`).forEach(el => {
    el.classList.add("selected-record");
  });
}

updateEditModeUI();
</script>

</body>
</html>
